name: Auto Merge

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Enable auto-merge for registry PRs
    runs-on: ubuntu-latest
    if: github.event.label.name == 'auto-merge'
    steps:
      - uses: actions/checkout@v6

      - name: Verify only registry.json is modified
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} \
            --json files \
            --jq '[.files[].path] | sort | join("\n")' \
            --repo ${{ github.repository }})
          echo "Files changed in this PR:"
          echo "$FILES"
          if [ "$FILES" != "registry.json" ]; then
            echo "❌ PR modifies files other than registry.json — skipping auto-merge"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        run: gh pr merge --auto --squash "${{ github.event.pull_request.html_url }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
